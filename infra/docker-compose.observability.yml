version: "3.9"

services:
  loki:
    image: grafana/loki:latest
    container_name: samgestor-loki
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ../observability/loki-config.yaml:/etc/loki/loki-config.yaml
    ports:
      - "3100:3100"
    networks:
      - samgestor-observability

  prometheus:
    image: prom/prometheus:latest
    container_name: samgestor-prometheus
    volumes:
      - ../observability/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - samgestor-observability

  tempo:
    image: grafana/tempo:latest
    container_name: samgestor-tempo
    command: ["-config.file=/etc/tempo/tempo-config.yaml"]
    volumes:
      - ../observability/tempo-config.yaml:/etc/tempo/tempo-config.yaml
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    networks:
      - samgestor-observability

  grafana:
    image: grafana/grafana:latest
    container_name: samgestor-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
    volumes:
      - ../observability/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yaml
    ports:
      - "3000:3000"
    depends_on:
      - loki
      - prometheus
      - tempo
    networks:
      - samgestor-observability

networks:
  samgestor-observability:
    driver: bridge
