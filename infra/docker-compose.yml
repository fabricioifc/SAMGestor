services:
  db:
    image: postgres:16
    container_name: samgestor-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: samgestor-pgadmin
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5050:80"

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: samgestor-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: samgestor-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  redis:
    image: redis:7-alpine
    container_name: samgestor-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  coreapi:
    build:
      context: ..
      dockerfile: src/SAMGestor.API/Dockerfile
    container_name: samgestor-coreapi
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      DB_SCHEMA: core
      MessageBus__Host: rabbitmq
      MessageBus__User: ${RABBITMQ_USER}
      MessageBus__Pass: ${RABBITMQ_PASS}
      Smtp__Host: mailhog
      Smtp__Port: 1025
      Outbox__BatchSize: "50"
      Outbox__PollIntervalSeconds: "10"
      Outbox__UseListenNotify: "false"
      Outbox__ListenChannel: outbox_new
      Outbox__WatchdogSeconds: "30"
      Storage__Provider: Local
      Storage__BasePath: /app/wwwroot/uploads
      Storage__PublicBaseUrl: http://localhost:5000/uploads
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__RefreshTokenDays: ${JWT_REFRESH_DAYS}
      Jwt__AccessTokenMinutes: ${JWT_ACCESS_MINUTES}
      Jwt__RefreshTokenReusePeriodSeconds: ${JWT_REFRESH_REUSE_PERIOD_SECONDS}
      Redis__ConnectionString: redis:6379
      Redis__InstanceName: "samgestor:core:"
    ports:
      - "5000:8080"
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mailhog:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - ./uploads:/app/wwwroot/uploads

  notificationapi:
    build:
      context: ..
      dockerfile: services/notification/src/SAMGestor.Notification.API/Dockerfile
    container_name: samgestor-notificationapi
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      DB_SCHEMA: notification
      MessageBus__Host: rabbitmq
      MessageBus__User: ${RABBITMQ_USER}
      MessageBus__Pass: ${RABBITMQ_PASS}
      Smtp__Host: mailhog
      Smtp__Port: 1025
    ports:
      - "5001:8080"
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mailhog:
        condition: service_started

  paymentapi:
    build:
      context: ..
      dockerfile: services/payment/src/SAMGestor.Payment.API/Dockerfile
    container_name: samgestor-paymentapi
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      DB_SCHEMA: payment
      MessageBus__Host: rabbitmq
      MessageBus__User: ${RABBITMQ_USER}
      MessageBus__Pass: ${RABBITMQ_PASS}
      MercadoPago__AccessToken: ${MERCADO_PAGO_ACCESS_TOKEN}
      PaymentLink__PublicBaseUrl: https://cacodaemonic-arcelia-nonpolarizable.ngrok-free.dev
    ports:
      - "5002:8080"
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
